<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Subtle background plate (keeps the bike readable on black UI) -->
  <rect x="90" y="90" width="1020" height="520" rx="48" fill="url(#g)" opacity="0.9"/>

  <!-- Wheels -->
  <g filter="url(#shadow)">
    <circle cx="380" cy="470" r="150" stroke="#111" stroke-width="26"/>
    <circle cx="860" cy="470" r="150" stroke="#111" stroke-width="26"/>
  </g>

  <!-- Frame -->
  <g stroke="#0f0f0f" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- main triangle -->
    <path d="M460 470 L580 280 L720 470 Z"/>
    <!-- top tube to head tube -->
    <path d="M580 280 L760 300"/>
    <!-- head tube to front wheel -->
    <path d="M760 300 L860 470"/>
    <!-- seat tube -->
    <path d="M580 280 L520 210"/>
    <!-- chain stay -->
    <path d="M460 470 L380 470"/>
    <!-- rear stay -->
    <path d="M580 280 L380 470"/>
  </g>

  <!-- Handlebar + fork -->
  <g stroke="#101010" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <path d="M740 300 L820 260"/>
    <path d="M820 260 L880 270"/>
    <path d="M760 300 L760 350"/>
  </g>

  <!-- Seat -->
  <g fill="#111">
    <path d="M470 200 C520 175 590 178 620 205 C585 230 520 235 470 220 Z"/>
  </g>

  <!-- Crank -->
  <g stroke="#111" stroke-width="18" stroke-linecap="round">
    <circle cx="460" cy="470" r="28" fill="#0b0b0b"/>
    <path d="M460 470 L420 515"/>
    <path d="M460 470 L500 430"/>
  </g>
</svg>

